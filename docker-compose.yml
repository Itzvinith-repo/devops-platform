version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      # Share the SQLite database file so Docker sees the same data as desktop
      - ./backend/instance:/app/instance
    environment:
      - FLASK_ENV=development
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # Browser runs on host, so it needs localhost to reach backend
      - VITE_API_URL=http://localhost:5000/api
      - VITE_PROXY_TARGET=http://backend:5000
    command: npx vite --port 5173 --host
    restart: unless-stopped
